services:
   mysql:
      image: mysql:8.0
      container_name: megamesari_mysql
      restart: unless-stopped
      environment:
         MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
         MYSQL_DATABASE: megamesarigroup
         MYSQL_USER: ${DB_USER}
         MYSQL_PASSWORD: ${DB_PASS}
      volumes:
         - mysql_data:/var/lib/mysql
         - ./megamesarigroup.sql:/docker-entrypoint-initdb.d/megamesarigroup.sql
      healthcheck:
         test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
         interval: 10s
         timeout: 5s
         retries: 10
      networks:
         - megamesari_network

   backend:
      build: ./backend
      container_name: megamesari_backend
      restart: unless-stopped
      environment:
         DB_HOST: mysql
         DB_PORT: 3306
         DB_NAME: megamesarigroup
         DB_USER: ${DB_USER}
         DB_PASS: ${DB_PASS}
         JWT_SECRET: ${JWT_SECRET}
         JWT_EXPIRES: ${JWT_EXPIRES:-1d}
         CLIENT_ORIGIN: ${CLIENT_ORIGIN}
         EMAIL_USER: ${EMAIL_USER}
         EMAIL_PASS: ${EMAIL_PASS}
         PORT: 3000
         NODE_ENV: production
      volumes:
         - uploads_data:/app/uploads
      depends_on:
         mysql:
            condition: service_healthy
      networks:
         - megamesari_network

   frontend:
      build:
         context: ./frontend
         dockerfile: Dockerfile
         args:
            VITE_API_URL: ${VITE_API_URL}
            VITE_UPLOADS_URL: ${VITE_UPLOADS_URL}
      container_name: megamesari_frontend
      restart: unless-stopped
      depends_on:
         - backend
      networks:
         - megamesari_network

   reverse-proxy:
      image: nginx:alpine
      container_name: megamesari_reverse_proxy
      restart: unless-stopped
      ports:
         - "80:80"
      volumes:
         - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
         - frontend
         - backend
      networks:
         - megamesari_network

volumes:
   mysql_data:
   uploads_data:

networks:
   megamesari_network:
      driver: bridge
