services:
   mysql:
      image: mysql:8.0
      container_name: megamesari_mysql
      restart: unless-stopped
      environment:
         MYSQL_ROOT_PASSWORD: rootpassword
         MYSQL_DATABASE: megamesarigroup
         MYSQL_USER: user
         MYSQL_PASSWORD: password
      ports:
         - "3306:3306"
      volumes:
         - mysql_data:/var/lib/mysql
         - ./megamesarigroup.sql:/docker-entrypoint-initdb.d/megamesarigroup.sql
      networks:
         - megamesari_network

   backend:
      build: ./backend
      container_name: megamesari_backend
      restart: unless-stopped
      environment:
         DB_HOST: mysql
         DB_PORT: 3306
         DB_NAME: megamesarigroup
         DB_USER: user
         DB_PASS: password
         NODE_ENV: production
      ports:
         - "3000:3000"
      depends_on:
         - mysql
      networks:
         - megamesari_network

   frontend:
      # PENTING: Untuk production, kita tidak menggunakan Dockerfile.dev dan volume lokal.
      # Kita gunakan Dockerfile asli karena itu berisi Nginx dan built assets npm run build!
      build:
         context: ./frontend
         dockerfile: Dockerfile
      container_name: megamesari_frontend
      restart: unless-stopped
      ports:
         - "80:80"
         # nginx jalan di port 80, jadi web frontend production bisa diakses di http://localhost:80
      depends_on:
         - backend
      networks:
         - megamesari_network

volumes:
   mysql_data:

networks:
   megamesari_network:
      driver: bridge
